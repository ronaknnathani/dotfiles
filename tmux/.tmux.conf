# Mouse: click to focus, wheel to scroll, drag borders to resize, drag to select text.
set -g mouse on

# Route copied selections to the local system clipboard via OSC 52.
# Works over SSH because Ghostty translates OSC 52 to the local clipboard.
set -s set-clipboard on

# After a mouse drag-select, copy the selection AND keep it highlighted
# (default behavior exits copy-mode and clears the selection on release).
# Bound on both tables because tmux picks copy-mode (emacs) vs copy-mode-vi
# based on $EDITOR; hx/cursor land in emacs copy-mode.
bind-key -T copy-mode    MouseDragEnd1Pane send-keys -X copy-selection-no-clear
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-no-clear

# Larger scrollback so mouse-wheel can scroll further back through Claude output.
set -g history-limit 50000

# Convenience: reload the config in-place.
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"
